<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workspace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #0F172A;
      color: white;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #020617;
      padding: 10px;
      border-right: 1px solid #1e293b;
    }

    .file {
      padding: 8px;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .file:hover {
      background: #1e293b;
    }

    /* Editor */
    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea {
      flex: 1;
      background: #020617;
      color: white;
      border: none;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      outline: none;
    }

    .toolbar {
      padding: 10px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    button {
      padding: 8px 12px;
      margin-right: 5px;
      background: #3B82F6;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Preview */
    .preview {
      width: 40%;
      border-left: 1px solid #1e293b;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar" id="fileList"></div>

  <!-- Editor -->
  <div class="editor">
    <div class="toolbar">
      <button onclick="saveFile()">Save</button>
      <button onclick="runPreview()">Run ▶</button>
    </div>
    <textarea id="editor"></textarea>
  </div>

  <!-- Preview -->
  <div class="preview">
    <iframe id="preview"></iframe>
  </div>

  <script>
    const SUPABASE_URL = "https://wxmxolutfcrcwboaoacx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bXhvbHV0ZmNyY3dib2FvYWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzYxOTUsImV4cCI6MjA5MDQ1MjE5NX0.CeBDsGFs_i3iDQuQMWvDyi6FEkLbIO4jokbRSAC7N_o";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentFile = null;
    let files = [];

    // 🔷 Get folder_id from URL
    const urlParams = new URLSearchParams(window.location.search);
    const folderId = urlParams.get("folder_id");

    // 🔷 Check login
    async function checkAuth() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = "auth.html";
      }
    }

    // 🔷 Load files
    async function loadFiles() {
      const { data, error } = await supabaseClient
        .from("files")
        .select("*")
        .eq("folder_id", folderId)
        .order("created_at", { ascending: true });

      if (error) {
        console.log(error);
        return;
      }

      files = data;
      renderFileList();
    }

    // 🔷 Show files in sidebar
    function renderFileList() {
      const list = document.getElementById("fileList");
      list.innerHTML = "";

      files.forEach(file => {
        const div = document.createElement("div");
        div.className = "file";
        div.innerText = file.name;

        div.onclick = () => openFile(file);

        list.appendChild(div);
      });
    }

    // 🔷 Open file
    function openFile(file) {
      currentFile = file;
      document.getElementById("editor").value = file.content;
    }

    // 🔷 Save file
    async function saveFile() {
      if (!currentFile) return;

      const content = document.getElementById("editor").value;

      const { error } = await supabaseClient
        .from("files")
        .update({ content })
        .eq("id", currentFile.id);

      if (!error) {
        currentFile.content = content;
        runPreview();
        alert("Saved!");
      }
    }

    // 🔷 Run Preview
    function runPreview() {
      let html = "";
      let css = "";
      let js = "";

      files.forEach(f => {
        if (f.type === "html") html = f.content;
        if (f.type === "css") css = f.content;
        if (f.type === "js") js = f.content;
      });

      const fullCode = `
        <html>
        <head>
          <style>${css}</style>
        </head>
        <body>
          ${html}
          <script>${js}<\/script>
        </body>
        </html>
      `;

      const iframe = document.getElementById("preview");
      iframe.srcdoc = fullCode;
    }

    // 🔷 Init
    async function init() {
      await checkAuth();
      await loadFiles();
    }

    init();
  </script>

</body>
</html>

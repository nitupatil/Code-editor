<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Folder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0F172A;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #1E293B;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .primary { background: #3B82F6; color: white; }
    .danger { background: #EF4444; color: white; }

    .container {
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .file {
      background: #1E293B;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .file:hover {
      background: #334155;
    }

    .actions button {
      margin-left: 5px;
    }

    .empty {
      text-align: center;
      color: #94A3B8;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <header>
    <h2>Folder Files</h2>
    <button class="btn danger" onclick="goBack()">Back</button>
  </header>

  <div class="container">

    <div class="top-bar">
      <input type="text" id="search" placeholder="Search files..." oninput="renderFiles()">
      <button class="btn primary" onclick="createFile()">+ New File</button>
    </div>

    <div id="files" class="file-list"></div>

    <div id="emptyState" class="empty" style="display:none;">
      No files found. Create your first file 🚀
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://wxmxolutfcrcwboaoacx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bXhvbHV0ZmNyY3dib2FvYWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzYxOTUsImV4cCI6MjA5MDQ1MjE5NX0.CeBDsGFs_i3iDQuQMWvDyi6FEkLbIO4jokbRSAC7N_o";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const folderId = params.get("folder_id");

    let allFiles = [];

    // 🔷 Check login
    async function checkUser() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = "auth.html";
      }
    }

    // 🔷 Load files
    async function loadFiles() {
      const { data, error } = await supabaseClient
        .from("files")
        .select("*")
        .eq("folder_id", folderId)
        .order("created_at", { ascending: false });

      if (!error) {
        allFiles = data;
        renderFiles();
      }
    }

    // 🔷 Render files
    function renderFiles() {
      const container = document.getElementById("files");
      const search = document.getElementById("search").value.toLowerCase();

      container.innerHTML = "";

      const filtered = allFiles.filter(f =>
        f.name.toLowerCase().includes(search)
      );

      if (filtered.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        return;
      } else {
        document.getElementById("emptyState").style.display = "none";
      }

      filtered.forEach(file => {
        const div = document.createElement("div");
        div.className = "file";

        div.innerHTML = `
          <div onclick="openFile('${file.id}')">${file.name} (${file.type})</div>
          <div class="actions">
            <button onclick="renameFile('${file.id}')">Rename</button>
            <button onclick="deleteFile('${file.id}')">Delete</button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    // 🔷 Create file
    async function createFile() {
      const name = prompt("Enter file name (e.g. index.html):");
      if (!name) return;

      let type = "html";
      if (name.endsWith(".css")) type = "css";
      else if (name.endsWith(".js")) type = "js";

      const { error } = await supabaseClient.from("files").insert([
        {
          folder_id: folderId,
          name: name,
          type: type,
          content: ""
        }
      ]);

      if (!error) loadFiles();
      else alert("Error creating file");
    }

    // 🔷 Rename file
    async function renameFile(id) {
      const newName = prompt("Enter new name:");
      if (!newName) return;

      const { error } = await supabaseClient
        .from("files")
        .update({ name: newName })
        .eq("id", id);

      if (!error) loadFiles();
    }

    // 🔷 Delete file
    async function deleteFile(id) {
      if (!confirm("Delete this file?")) return;

      const { error } = await supabaseClient
        .from("files")
        .delete()
        .eq("id", id);

      if (!error) loadFiles();
    }

    // 🔷 Open file in editor
    function openFile(id) {
      window.location.href = `workspace.html?file_id=${id}&folder_id=${folderId}`;
    }

    // 🔷 Back to dashboard
    function goBack() {
      window.location.href = "dashboard.html";
    }

    // 🔷 Init
    checkUser();
    loadFiles();
  </script>

</body>
</html>

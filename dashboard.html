<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0F172A;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #1E293B;
    }

    h2 {
      margin: 0;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .primary {
      background: #3B82F6;
      color: white;
    }

    .danger {
      background: #EF4444;
      color: white;
    }

    .container {
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1E293B;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: #334155;
    }

    .empty {
      text-align: center;
      color: #94A3B8;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <header>
    <h2>My Projects</h2>
    <button class="btn danger" onclick="logout()">Logout</button>
  </header>

  <div class="container">

    <div class="top-bar">
      <input type="text" id="search" placeholder="Search folders..." oninput="renderFolders()">
      <button class="btn primary" onclick="createFolder()">+ New Folder</button>
    </div>

    <div id="folders" class="grid"></div>

    <div id="emptyState" class="empty" style="display:none;">
      No folders found. Create your first project 🚀
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://wxmxolutfcrcwboaoacx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bXhvbHV0ZmNyY3dib2FvYWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzYxOTUsImV4cCI6MjA5MDQ1MjE5NX0.CeBDsGFs_i3iDQuQMWvDyi6FEkLbIO4jokbRSAC7N_o";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allFolders = [];

    // 🔷 Check login
    async function checkUser() {
      const { data } = await supabaseClient.auth.getSession();

      if (!data.session) {
        window.location.href = "auth.html";
      }
    }

    // 🔷 Load folders
    async function loadFolders() {
      const { data, error } = await supabaseClient
        .from("folders")
        .select("*")
        .order("created_at", { ascending: false });

      if (!error) {
        allFolders = data;
        renderFolders();
      }
    }

    // 🔷 Render folders
    function renderFolders() {
      const container = document.getElementById("folders");
      const search = document.getElementById("search").value.toLowerCase();

      container.innerHTML = "";

      const filtered = allFolders.filter(f =>
        f.name.toLowerCase().includes(search)
      );

      if (filtered.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        return;
      } else {
        document.getElementById("emptyState").style.display = "none";
      }

      filtered.forEach(folder => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h3>${folder.name}</h3>`;
        div.onclick = () => openFolder(folder.id);
        container.appendChild(div);
      });
    }

    // 🔷 Create folder
    async function createFolder() {
      const name = prompt("Enter folder name:");

      if (!name) return;

      const user = (await supabaseClient.auth.getUser()).data.user;

      const { error } = await supabaseClient.from("folders").insert([
        {
          name: name,
          user_id: user.id
        }
      ]);

      if (!error) {
        loadFolders();
      } else {
        alert("Error creating folder");
      }
    }

    // 🔷 Open folder
    function openFolder(id) {
      window.location.href = "folder.html?folder_id=" + id;
    }

    // 🔷 Logout
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "auth.html";
    }

    // 🔷 Init
    checkUser();
    loadFolders();
  </script>

</body>
</html>
